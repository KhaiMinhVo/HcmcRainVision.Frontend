# Deploy frontend to https://khaiminhvo.github.io/ (root).
# Build uses base: '/' so the app is served at root. Deploys to repo khaiminhvo/khaiminhvo.github.io.
# Required: Create repo "khaiminhvo.github.io" and add secret GH_PAT (Personal Access Token with repo scope).
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/HCMRAINVISION/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: Frontend/HCMRAINVISION

      # Build with base '/' so the app is served at https://khaiminhvo.github.io/
      - name: Build
        run: npm run build
        working-directory: Frontend/HCMRAINVISION
        env:
          GITHUB_REPOSITORY: khaiminhvo/khaiminhvo.github.io

      - name: Deploy to khaiminhvo.github.io
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: khaiminhvo/khaiminhvo.github.io
          publish_branch: main
          publish_dir: Frontend/HCMRAINVISION/dist
          allow_empty_commit: true
